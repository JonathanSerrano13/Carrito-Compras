<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sweet Market</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo" onclick="window.location.href='/index.html'">Sweet Market</h1>
            <div class="header-spacer" aria-hidden="true"></div>
        </div>
    </header>
    <main class="pagina-autenticacion">
        <section class="tarjeta-base tarjeta-autenticacion">
        <form id="form-login">
            <h2 class="form-title">Iniciar Sesion</h2>
            <input type="email" id="l-cor" placeholder="Correo" required>
            <div class="password-field">
                <input type="password" id="l-pas" placeholder="Contraseña (exactamente 6 caracteres)" minlength="6" maxlength="6" required>
                <button type="button" class="boton-contrasena boton-secundario" data-target="l-pas" aria-label="Mostrar u ocultar contrasena">Mostrar</button>
            </div>
            <button type="submit" class="boton-formulario boton-principal">Entrar</button>

            <button type="button" id="btn-google-login" class="boton-google-aut boton-secundario">Iniciar con Google</button>

            <div class="form-separator"></div>
            <p class="cambio-autenticacion">No tienes cuenta? <a href="register.html">Registrate</a></p>
        </form>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/alertas.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>

</html>
