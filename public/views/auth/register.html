<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sweet Market</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo" onclick="window.location.href='/index.html'">Sweet Market</h1>
            <div class="header-spacer" aria-hidden="true"></div>
        </div>
    </header>
    <main class="pagina-autenticacion">
        <section class="tarjeta-base tarjeta-autenticacion">
        <form id="form-registro">
            <h2 class="form-title">Crea tu cuenta</h2>
            <input type="text" id="nom" placeholder="Nombre" required>
            <input type="email" id="cor" placeholder="Correo electronico" required>
            <div class="password-field">
                <input type="password" id="pas" placeholder="Contrasena (exactamente 6 caracteres)" minlength="6" maxlength="6" required>
                <button type="button" class="boton-contrasena boton-secundario" data-target="pas" aria-label="Mostrar u ocultar contrasena">Mostrar</button>
            </div>
            <button type="submit" class="boton-formulario boton-principal">Registrarme</button>

            <button type="button" id="btn-google-register" class="boton-google-aut boton-secundario">Registrarme con Google</button>

            <div class="form-separator"></div>
            <p class="cambio-autenticacion">Ya tienes cuenta? <a href="login.html">Inicia sesion</a></p>
        </form>
        </section>
    </main>
    <script type="module" src="../../js/auth/auth.js"></script>
</body>

</html>
