<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sweet Market</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo" onclick="window.location.href='/index.html'">Sweet Market</h1>
            <div class="header-spacer" aria-hidden="true"></div>
        </div>
    </header>
    <div class="container" style="max-width: 400px;">
        <form id="form-registro">
            <h2 class="form-title">Crea tu cuenta</h2>
            <input type="text" id="nom" placeholder="Nombre" required>
            <input type="email" id="cor" placeholder="Correo electrónico" required>
            <div class="password-field">
                <input type="password" id="pas" placeholder="Contraseña (exactamente 6 caracteres)" minlength="6" maxlength="6" required>
                <button type="button" class="toggle-password" data-target="pas" aria-label="Mostrar u ocultar contraseña">Mostrar</button>
            </div>
            <button type="submit">Registrarme</button>

            <button type="button" id="btn-google-register" class="google-auth-btn">
                Registrarme con Google
            </button>

            <div class="form-separator"></div>
            <p class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </form>
    </div>
    <script type="module" src="../js/auth/auth.js"></script>
</body>

</html>
