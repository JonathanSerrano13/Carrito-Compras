<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pago - Sweet Market</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo" onclick="window.location.href='/index.html'">Sweet Market</h1>
            <div class="search-bar"> <input type="text" placeholder="Buscar productos...">
                <button type="button">Buscar</button>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div class="sub-header-container">
            <nav id="menu-usuario" class="user-menu"></nav>
        </div>
    </div>

    <main class="pagina-pago">
        <section class="tarjeta-pago panel-pago tarjeta-base">
            <h3>Pago Seguro</h3>
            <p>Serás redirigido al checkout oficial de Mercado Pago para completar tu compra.</p>

            <section class="bloque-envio" aria-labelledby="titulo-envio">
                <h4 id="titulo-envio">Dirección de envío</h4>

                <div class="fila-envio">
                    <div class="campo-envio">
                        <label for="envio-nombre">Recibe</label>
                        <input type="text" id="envio-nombre" placeholder="Nombre y apellido" autocomplete="name" required>
                    </div>
                    <div class="campo-envio">
                        <label for="envio-telefono">Teléfono</label>
                        <input type="tel" id="envio-telefono" placeholder="3001234567" autocomplete="tel" required>
                    </div>
                </div>

                <div class="fila-envio">
                    <div class="campo-envio">
                        <label for="envio-ciudad">Ciudad</label>
                        <input type="text" id="envio-ciudad" placeholder="Bogotá" autocomplete="address-level2" required>
                    </div>
                    <div class="campo-envio">
                        <label for="envio-direccion">Dirección</label>
                        <input type="text" id="envio-direccion" placeholder="Calle 123 #45-67" autocomplete="street-address" required>
                    </div>
                </div>

                <div class="campo-envio campo-envio--completo">
                    <label for="envio-referencia">Referencia (opcional)</label>
                    <input type="text" id="envio-referencia" placeholder="Apto, piso, torre o indicaciones adicionales">
                </div>
            </section>
        </section>

        <aside class="tarjeta-pago resumen-pago tarjeta-base">
            <h3>Resumen</h3>
            <div class="linea-pago">
                <span>Productos:</span>
                <span id="resumen-subtotal">$0.00</span>
            </div>
            <div class="linea-pago linea-pago--total">
                <span>Total a pagar:</span>
                <strong id="resumen-total">$0.00</strong>
            </div>
            <button id="btn-finalizar" class="boton-finalizar boton-principal" onclick="procesarPago()">Ir a pagar con Mercado Pago</button>
        </aside>
    </main>

    <script src="../../js/compartido/sesion.js"></script>
    <script src="../../js/pagos/pago.js"></script>
</body>

</html>
