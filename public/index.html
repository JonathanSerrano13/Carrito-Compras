<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Market - Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">Sweet Market</h1>
            <div class="search-bar">
                <input type="text" placeholder="Busca libros, gadgets, servicios...">
                <button type="button">Buscar</button>
            </div>
        </div>
    </header>

    <div class="sub-header">
        <div class="sub-header-container">
            <nav id="menu-usuario" class="user-menu"></nav>
        </div>
    </div>

    <main class="container">
        <section class="products-section">
            <div class="product-grid" id="catalogo-principal">
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/alertas.js"></script>
    <script src="js/sesion.js"></script>
    <script src="js/tienda.js"></script>
</body>

</html>
